<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4A90E2">
    <title>天氣預報 Pro (手機平板雙用)</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* ================= 基礎設定與變數 ================= */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.25);
            --glass-shadow: 0 4px 24px 0 rgba(0, 0, 0, 0.1);
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.75);
            --accent-color: rgba(255, 255, 255, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: #000; color: var(--text-primary);
            min-height: 100vh; min-height: 100dvh;
            overflow-x: hidden; position: relative;
        }

        /* ================= 動態背景主題 ================= */
        #bg-container {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1; transition: background 1s ease-in-out;
        }
        .theme-sunny { background: linear-gradient(135deg, #2b5876, #4e4376); } /* 改為更具質感的深藍漸層 */
        .theme-rainy { background: linear-gradient(135deg, #141E30, #243B55); }
        .theme-night { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); }

        /* ================= 主容器與響應式網格 ================= */
        .app-container {
            max-width: 900px; /* 平板最大寬度 */
            margin: 0 auto;
            padding: env(safe-area-inset-top, 15px) 15px env(safe-area-inset-bottom, 15px);
        }

        .header {
            display: flex; gap: 10px; align-items: center; margin-bottom: 15px;
            animation: fadeUp 0.6s ease forwards;
        }
        
        /* 儀表板排版 (手機單欄，平板雙欄) */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px; /* 緊緻的間距 */
        }

        @media (min-width: 768px) {
            .app-container { padding: 30px 20px; }
            .header { margin-bottom: 20px; }
            .dashboard-grid {
                grid-template-columns: 1fr 1.3fr; /* 左側略小，右側略大 */
                gap: 20px;
                align-items: start;
            }
            .left-column { display: flex; flex-direction: column; gap: 15px; position: sticky; top: 30px; }
            .right-column { display: flex; flex-direction: column; gap: 15px; }
            .current-weather { margin: 10px 0 20px; text-align: left; }
            .temperature { justify-content: flex-start; }
        }

        /* ================= UI 元件 ================= */
        .search-bar {
            flex: 1; background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 20px; padding: 10px 16px;
            display: flex; align-items: center; gap: 8px;
        }
        .search-bar input { background: transparent; border: none; color: white; font-size: 15px; width: 100%; outline: none; }
        .search-bar input::placeholder { color: var(--text-secondary); }
        
        .icon-btn {
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 50%;
            width: 42px; height: 42px; display: flex; justify-content: center; align-items: center;
            color: white; font-size: 18px; cursor: pointer; transition: transform 0.2s;
        }
        .icon-btn:active { transform: scale(0.9); }

        /* 當前天氣區塊 */
        .current-weather { text-align: center; margin: 10px 0 20px; animation: fadeUp 0.8s ease forwards; }
        .city-name { font-size: 28px; font-weight: 600; text-shadow: 0 2px 10px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; gap: 8px; }
        @media (min-width: 768px) { .city-name { justify-content: flex-start; } }
        .update-time { font-size: 12px; font-weight: normal; color: var(--text-secondary); background: rgba(0,0,0,0.2); padding: 2px 8px; border-radius: 10px; }
        .temperature { font-size: 80px; font-weight: 200; line-height: 1; margin: 5px 0; display: flex; justify-content: center; align-items: flex-start; }
        .temperature span { font-size: 32px; margin-top: 12px; }
        .condition { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
        .high-low { font-size: 14px; color: var(--text-secondary); }

        /* 毛玻璃卡片 (緊緻化) */
        .glass-card {
            background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 16px; box-shadow: var(--glass-shadow);
            opacity: 0; transform: translateY(15px); animation: fadeUp 0.8s ease forwards;
        }
        .card-title { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

        /* 擴展網格數據 (3欄位) */
        .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .metric-item { background: rgba(0,0,0,0.1); border-radius: 12px; padding: 10px; display: flex; flex-direction: column; gap: 4px; }
        .metric-value { font-size: 18px; font-weight: 600; }
        .metric-label { font-size: 11px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }

        /* 24小時預報 (更緊湊) */
        .hourly-forecast { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .hourly-forecast::-webkit-scrollbar { display: none; }
        .hourly-item { display: flex; flex-direction: column; align-items: center; gap: 8px; min-width: 50px; }
        .hourly-time { font-size: 13px; color: var(--text-secondary); }
        .hourly-icon { font-size: 22px; }
        .hourly-temp { font-size: 15px; font-weight: 600; }

        /* 7天預報 (緊緻列表) */
        .daily-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .daily-item:last-child { border-bottom: none; padding-bottom: 0; }
        .daily-day { flex: 1; font-size: 15px; }
        .daily-icon { flex: 1; text-align: center; font-size: 20px; color: var(--accent-color); color: #fff; }
        .daily-temps { flex: 1; text-align: right; font-size: 15px; font-weight: 500; display: flex; justify-content: flex-end; gap: 12px; }
        .temp-min { color: var(--text-secondary); }
        .progress-bar { width: 50px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; margin-top: auto; margin-bottom: auto; display: none; }
        @media (min-width: 768px) { .progress-bar { display: block; } } /* 平板顯示溫度條 */
        .progress-fill { height: 100%; background: linear-gradient(90deg, #87CEEB, #FFA07A); border-radius: 2px; }

        /* 日出日落專區 */
        .sun-cycle { display: flex; justify-content: space-around; align-items: center; padding: 5px 0; }
        .sun-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .sun-icon { font-size: 28px; color: #FFD700; }
        .sun-time { font-size: 16px; font-weight: 600; }
        .sun-label { font-size: 12px; color: var(--text-secondary); }

        /* 動畫與載入 */
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        .delay-1 { animation-delay: 0.1s; } .delay-2 { animation-delay: 0.2s; } .delay-3 { animation-delay: 0.3s; }
        
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999; display: flex; justify-content: center; align-items: center; flex-direction: column; transition: opacity 0.3s;
        }
        .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.2); border-top: 3px solid white; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 12px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div><p style="font-size: 14px; color: #aaa;">載入天氣資訊...</p></div>
    <div id="bg-container" class="theme-sunny"></div>

    <div class="app-container">
        <div class="header">
            <div class="search-bar">
                <i class="ph ph-magnifying-glass"></i>
                <input type="text" id="search-input" placeholder="搜尋城市 (如: Taipei)">
            </div>
            <div class="icon-btn" onclick="getLocationWeather()" title="目前位置">
                <i class="ph ph-navigation-arrow"></i>
            </div>
            <div class="icon-btn" onclick="refreshData()" title="重新整理">
                <i class="ph ph-arrows-clockwise"></i>
            </div>
        </div>

        <div class="dashboard-grid">
            
            <div class="left-column">
                <div class="current-weather">
                    <div class="city-name"><span id="city-name">--</span> <span class="update-time" id="update-time">--:-- 更新</span></div>
                    <div class="temperature"><span id="temp-val">--</span><span>°</span></div>
                    <div class="condition" id="condition-text">--</div>
                    <div class="high-low">H:<span id="temp-max">--</span>°  L:<span id="temp-min">--</span>°</div>
                </div>

                <div class="glass-card delay-1">
                    <div class="card-title"><i class="ph ph-squares-four"></i> 天氣指標</div>
                    <div class="metrics-grid">
                        <div class="metric-item">
                            <span class="metric-label"><i class="ph ph-thermometer"></i> 體感</span>
                            <span class="metric-value"><span id="feels-like">--</span>°</span>
                        </div>
                        <div class="metric-item">
                            <span class="metric-label"><i class="ph ph-drop"></i> 濕度</span>
                            <span class="metric-value"><span id="humidity">--</span>%</span>
                        </div>
                        <div class="metric-item">
                            <span class="metric-label"><i class="ph ph-cloud-rain"></i> 降雨率</span>
                            <span class="metric-value"><span id="rain-chance">--</span>%</span>
                        </div>
                        <div class="metric-item">
                            <span class="metric-label"><i class="ph ph-wind"></i> 風速</span>
                            <span class="metric-value"><span id="wind-speed">--</span> <span style="font-size:10px">km/h</span></span>
                        </div>
                        <div class="metric-item">
                            <span class="metric-label"><i class="ph ph-sun"></i> 紫外線</span>
                            <span class="metric-value" id="uv-index">--</span>
                        </div>
                        <div class="metric-item">
                            <span class="metric-label"><i class="ph ph-gauge"></i> 氣壓</span>
                            <span class="metric-value"><span id="pressure">--</span> <span style="font-size:10px">hPa</span></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="right-column">
                <div class="glass-card delay-2">
                    <div class="card-title"><i class="ph ph-clock"></i> 24小時預報</div>
                    <div class="hourly-forecast" id="hourly-container"></div>
                </div>

                <div class="glass-card delay-3">
                    <div class="card-title"><i class="ph ph-sun-horizon"></i> 日出與日落</div>
                    <div class="sun-cycle">
                        <div class="sun-item">
                            <i class="ph ph-sun-dim sun-icon"></i>
                            <span class="sun-time" id="sunrise-time">--:--</span>
                            <span class="sun-label">日出</span>
                        </div>
                        <div class="sun-item">
                            <i class="ph ph-moon-stars sun-icon" style="color:#C0C0C0"></i>
                            <span class="sun-time" id="sunset-time">--:--</span>
                            <span class="sun-label">日落</span>
                        </div>
                    </div>
                </div>

                <div class="glass-card delay-3">
                    <div class="card-title"><i class="ph ph-calendar-blank"></i> 7天預報</div>
                    <div id="daily-container"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const loader = document.getElementById('loader');
        let currentLat = 25.0330;
        let currentLon = 121.5654;
        let currentCityName = '台北市';

        // WMO 天氣代碼對應
        const weatherCodes = {
            0: { text: '晴朗', icon: 'ph-sun', theme: 'sunny' },
            1: { text: '大部晴朗', icon: 'ph-sun-dim', theme: 'sunny' },
            2: { text: '多雲', icon: 'ph-cloud', theme: 'sunny' },
            3: { text: '陰天', icon: 'ph-clouds', theme: 'rainy' },
            45: { text: '霧', icon: 'ph-cloud-fog', theme: 'rainy' },
            48: { text: '霧', icon: 'ph-cloud-fog', theme: 'rainy' },
            51: { text: '毛毛雨', icon: 'ph-cloud-rain', theme: 'rainy' },
            61: { text: '小雨', icon: 'ph-cloud-rain', theme: 'rainy' },
            63: { text: '中雨', icon: 'ph-cloud-rain', theme: 'rainy' },
            65: { text: '大雨', icon: 'ph-cloud-rain', theme: 'rainy' },
            71: { text: '雪', icon: 'ph-cloud-snow', theme: 'rainy' },
            95: { text: '雷雨', icon: 'ph-cloud-lightning', theme: 'rainy' }
        };

        function formatTime(isoString) {
            const date = new Date(isoString);
            return `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
        }

        async function fetchWeatherData(lat, lon, cityName) {
            currentLat = lat; currentLon = lon; currentCityName = cityName;
            try {
                // 加入了 uv_index, surface_pressure, sunrise, sunset 等更多資料
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,is_day,weather_code,wind_speed_10m,surface_pressure&hourly=temperature_2m,precipitation_probability,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,uv_index_max&timezone=auto`;
                
                const response = await fetch(url);
                const data = await response.json();
                updateUI(data, cityName);
                
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 300);
            } catch (error) {
                console.error(error);
                alert("無法獲取天氣資料");
                loader.style.display = 'none';
            }
        }

        function updateUI(data, cityName) {
            const current = data.current;
            const daily = data.daily;
            const hourly = data.hourly;
            
            const code = current.weather_code;
            const weatherInfo = weatherCodes[code] || weatherCodes[0];
            const isNight = current.is_day === 0;

            // 背景主題
            document.getElementById('bg-container').className = isNight ? 'theme-night' : `theme-${weatherInfo.theme}`;

            // 當前天氣
            document.getElementById('city-name').innerText = cityName;
            document.getElementById('condition-text').innerText = weatherInfo.text;
            document.getElementById('temp-val').innerText = Math.round(current.temperature_2m);
            document.getElementById('temp-max').innerText = Math.round(daily.temperature_2m_max[0]);
            document.getElementById('temp-min').innerText = Math.round(daily.temperature_2m_min[0]);
            
            // 更新時間
            const now = new Date();
            document.getElementById('update-time').innerText = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')} 更新`;

            // 網格指標 (增加紫外線與氣壓)
            document.getElementById('feels-like').innerText = Math.round(current.apparent_temperature);
            document.getElementById('humidity').innerText = current.relative_humidity_2m;
            document.getElementById('wind-speed').innerText = Math.round(current.wind_speed_10m);
            document.getElementById('pressure').innerText = Math.round(current.surface_pressure);
            document.getElementById('uv-index').innerText = daily.uv_index_max[0] ? daily.uv_index_max[0].toFixed(1) : '--';
            
            const currentHourIdx = new Date().getHours();
            document.getElementById('rain-chance').innerText = hourly.precipitation_probability[currentHourIdx] || 0;

            // 日出日落
            document.getElementById('sunrise-time').innerText = formatTime(daily.sunrise[0]);
            document.getElementById('sunset-time').innerText = formatTime(daily.sunset[0]);

            // 24小時預報 (緊緻化)
            const hourlyContainer = document.getElementById('hourly-container');
            hourlyContainer.innerHTML = '';
            for(let i = currentHourIdx; i < currentHourIdx + 24; i+=1) { // 逐小時
                const time = new Date(hourly.time[i]);
                const hCode = hourly.weather_code[i];
                const hIcon = (weatherCodes[hCode] || weatherCodes[0]).icon;
                
                hourlyContainer.innerHTML += `
                    <div class="hourly-item">
                        <div class="hourly-time">${i === currentHourIdx ? '現在' : time.getHours() + '時'}</div>
                        <i class="ph ${hIcon} hourly-icon"></i>
                        <div class="hourly-temp">${Math.round(hourly.temperature_2m[i])}°</div>
                    </div>`;
            }

            // 7天預報 (含平板專屬的溫度條 UI)
            const dailyContainer = document.getElementById('daily-container');
            dailyContainer.innerHTML = '';
            const daysOfWeek = ['週日', '週一', '週二', '週三', '週四', '週五', '週六'];
            
            // 計算一週最高與最低溫的差距，用來畫溫度條
            const weekMin = Math.min(...daily.temperature_2m_min);
            const weekMax = Math.max(...daily.temperature_2m_max);
            const range = weekMax - weekMin || 1;

            for(let i = 0; i < 7; i++) {
                const date = new Date(daily.time[i]);
                const dCode = daily.weather_code[i];
                const dIcon = (weatherCodes[dCode] || weatherCodes[0]).icon;
                
                const dayMin = Math.round(daily.temperature_2m_min[i]);
                const dayMax = Math.round(daily.temperature_2m_max[i]);
                
                // 計算進度條寬度與偏移
                const leftPercent = ((dayMin - weekMin) / range) * 100;
                const widthPercent = ((dayMax - dayMin) / range) * 100;

                dailyContainer.innerHTML += `
                    <div class="daily-item">
                        <div class="daily-day">${i === 0 ? '今天' : daysOfWeek[date.getDay()]}</div>
                        <div class="daily-icon"><i class="ph ${dIcon}"></i></div>
                        <div class="daily-temps">
                            <span class="temp-min">${dayMin}°</span>
                            <div class="progress-bar">
                                <div class="progress-fill" style="margin-left: ${leftPercent}%; width: ${widthPercent}%;"></div>
                            </div>
                            <span>${dayMax}°</span>
                        </div>
                    </div>`;
            }
        }

        // 搜尋城市 (Open-Meteo Geocoding)
        async function searchCity(query) {
            loader.style.display = 'flex'; loader.style.opacity = '1';
            try {
                const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1&language=zh`);
                const data = await res.json();
                if(data.results && data.results.length > 0) {
                    const city = data.results[0];
                    fetchWeatherData(city.latitude, city.longitude, city.name);
                } else {
                    alert("找不到該城市，請嘗試英文地名 (如: Tokyo)");
                    loader.style.opacity = '0'; setTimeout(() => loader.style.display = 'none', 300);
                }
            } catch (err) { console.error(err); loader.style.display = 'none'; }
        }

        document.getElementById('search-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && this.value.trim() !== '') {
                searchCity(this.value.trim());
                this.blur();
            }
        });

        // 定位功能
        function getLocationWeather() {
            loader.style.display = 'flex'; loader.style.opacity = '1';
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        const lat = position.coords.latitude; const lon = position.coords.longitude;
                        try {
                            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
                            const data = await res.json();
                            const cityName = data.address.city || data.address.town || '目前位置';
                            fetchWeatherData(lat, lon, cityName);
                        } catch { fetchWeatherData(lat, lon, '目前位置'); }
                    },
                    (error) => { fetchWeatherData(25.0330, 121.5654, '台北市'); },
                    { timeout: 5000 }
                );
            } else { fetchWeatherData(25.0330, 121.5654, '台北市'); }
        }

        // 手動重新整理
        function refreshData() {
            loader.style.display = 'flex'; loader.style.opacity = '1';
            fetchWeatherData(currentLat, currentLon, currentCityName);
        }

        window.onload = () => getLocationWeather();
    </script>
</body>
</html>
