<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4A90E2">
    <title>高質感天氣預報</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* ================= 基礎設定與變數 ================= */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15);
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            color: var(--text-primary);
            overflow: hidden; /* 防止整個頁面滾動，由內部容器處理 */
            height: 100vh;
            height: 100dvh; /* 適配 iOS 底部 Safari 導航列 */
            transition: background 1s ease-in-out;
            position: relative;
        }

        /* ================= 動態背景主題 ================= */
        #bg-container {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            transition: background 1s ease-in-out;
        }
        .theme-sunny { background: linear-gradient(135deg, #4A90E2, #87CEEB); }
        .theme-rainy { background: linear-gradient(135deg, #2C3E50, #4CA1AF); }
        .theme-night { background: linear-gradient(135deg, #0F2027, #203A43, #2C5364); }

        /* ================= 動畫特效元件 ================= */
        .effect-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }
        
        /* 雲朵 */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50px;
            filter: blur(10px);
            animation: float 40s linear infinite;
        }
        @keyframes float {
            0% { transform: translateX(-150px); }
            100% { transform: translateX(120vw); }
        }

        /* 星星 */
        .star {
            position: absolute;
            background: #FFF;
            border-radius: 50%;
            animation: twinkle linear infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 10px #FFF; }
        }

        /* 雨滴 */
        .raindrop {
            position: absolute;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0.8));
            width: 2px;
            height: 15px;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-20px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        /* ================= 主容器 (模擬 iPhone App) ================= */
        .app-container {
            max-width: 500px;
            margin: 0 auto;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px);
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }
        /* 隱藏滾動條 */
        .app-container::-webkit-scrollbar { display: none; }

        /* ================= 搜尋與定位列 ================= */
        .header {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 10px;
            animation: fadeUp 0.8s ease forwards;
        }
        .search-bar {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .search-bar input {
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            width: 100%;
            outline: none;
        }
        .search-bar input::placeholder { color: var(--text-secondary); }
        .icon-btn {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            width: 46px; height: 46px;
            display: flex; justify-content: center; align-items: center;
            color: white; font-size: 20px; cursor: pointer;
            transition: transform 0.2s;
        }
        .icon-btn:active { transform: scale(0.9); }

        /* ================= 當前天氣區塊 ================= */
        .current-weather {
            text-align: center;
            margin: 20px 0 30px;
            animation: fadeUp 1s ease forwards;
        }
        .city-name { font-size: 32px; font-weight: 600; margin-bottom: 5px; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        .temperature { font-size: 96px; font-weight: 200; line-height: 1; margin: 5px 0; text-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; justify-content: center; align-items: flex-start; }
        .temperature span { font-size: 40px; margin-top: 15px; }
        .condition { font-size: 20px; font-weight: 500; margin-bottom: 5px; }
        .high-low { font-size: 16px; color: var(--text-secondary); }

        /* ================= 毛玻璃卡片共用樣式 ================= */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 20px;
            box-shadow: var(--glass-shadow);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s ease forwards;
        }
        .card-title {
            font-size: 14px; color: var(--text-secondary); margin-bottom: 15px;
            display: flex; align-items: center; gap: 6px; font-weight: 600;
        }

        /* ================= 網格數據 (濕度、風速等) ================= */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .metric-item {
            display: flex; flex-direction: column; gap: 5px;
        }
        .metric-value { font-size: 24px; font-weight: 600; }
        .metric-label { font-size: 13px; color: var(--text-secondary); }

        /* ================= 24小時預報 (橫向滑動) ================= */
        .hourly-forecast {
            display: flex; gap: 20px; overflow-x: auto; padding-bottom: 10px;
            scrollbar-width: none; /* Firefox */
        }
        .hourly-forecast::-webkit-scrollbar { display: none; } /* Chrome */
        .hourly-item {
            display: flex; flex-direction: column; align-items: center; gap: 10px; min-width: 60px;
        }
        .hourly-time { font-size: 14px; font-weight: 500; }
        .hourly-icon { font-size: 24px; }
        .hourly-temp { font-size: 16px; font-weight: 600; }

        /* ================= 7天預報 (列表) ================= */
        .daily-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .daily-item:last-child { border-bottom: none; padding-bottom: 0; }
        .daily-day { flex: 1; font-size: 16px; font-weight: 500; }
        .daily-icon { flex: 1; text-align: center; font-size: 24px; }
        .daily-temps { flex: 1; text-align: right; font-size: 16px; font-weight: 500; display: flex; justify-content: flex-end; gap: 15px; }
        .temp-min { color: var(--text-secondary); }

        /* 動畫 Keyframes */
        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }

        /* 載入中覆蓋層 */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999; display: flex; justify-content: center; align-items: center; flex-direction: column; color: white; transition: opacity 0.5s;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid white; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p>載入最新天氣資訊...</p>
    </div>

    <div id="bg-container" class="theme-sunny"></div>
    <div id="effect-layer" class="effect-layer"></div>

    <div class="app-container">
        <div class="header">
            <div class="search-bar">
                <i class="ph ph-magnifying-glass"></i>
                <input type="text" id="search-input" placeholder="搜尋城市 (如: Taipei, Tokyo)">
            </div>
            <div class="icon-btn" onclick="getLocationWeather()">
                <i class="ph ph-navigation-arrow"></i>
            </div>
        </div>

        <div class="current-weather">
            <div class="city-name" id="city-name">台北市</div>
            <div class="temperature"><span id="temp-val">--</span><span>°</span></div>
            <div class="condition" id="condition-text">晴朗</div>
            <div class="high-low">最高 <span id="temp-max">--</span>° / 最低 <span id="temp-min">--</span>°</div>
        </div>

        <div class="glass-card delay-1">
            <div class="metrics-grid">
                <div class="metric-item">
                    <div class="card-title"><i class="ph ph-thermometer"></i> 體感溫度</div>
                    <div class="metric-value"><span id="feels-like">--</span>°C</div>
                </div>
                <div class="metric-item">
                    <div class="card-title"><i class="ph ph-drop"></i> 濕度</div>
                    <div class="metric-value"><span id="humidity">--</span>%</div>
                </div>
                <div class="metric-item">
                    <div class="card-title"><i class="ph ph-wind"></i> 風速</div>
                    <div class="metric-value"><span id="wind-speed">--</span> km/h</div>
                </div>
                <div class="metric-item">
                    <div class="card-title"><i class="ph ph-cloud-rain"></i> 降雨機率</div>
                    <div class="metric-value"><span id="rain-chance">--</span>%</div>
                </div>
            </div>
        </div>

        <div class="glass-card delay-2">
            <div class="card-title"><i class="ph ph-clock"></i> 24小時預報</div>
            <div class="hourly-forecast" id="hourly-container">
                </div>
        </div>

        <div class="glass-card delay-3">
            <div class="card-title"><i class="ph ph-calendar-blank"></i> 7天預報</div>
            <div id="daily-container">
                </div>
        </div>
    </div>

    <script>
        // ================= 工具與動畫常數 =================
        const bgContainer = document.getElementById('bg-container');
        const effectLayer = document.getElementById('effect-layer');
        const loader = document.getElementById('loader');

        // WMO 天氣代碼對應表 (Open-Meteo API 標準)
        const weatherCodes = {
            0: { text: '晴朗', icon: 'ph-sun', theme: 'sunny', isRain: false },
            1: { text: '大部晴朗', icon: 'ph-sun-dim', theme: 'sunny', isRain: false },
            2: { text: '多雲', icon: 'ph-cloud', theme: 'sunny', isRain: false },
            3: { text: '陰天', icon: 'ph-clouds', theme: 'rainy', isRain: false },
            45: { text: '霧', icon: 'ph-cloud-fog', theme: 'rainy', isRain: false },
            48: { text: '霧凇', icon: 'ph-cloud-fog', theme: 'rainy', isRain: false },
            51: { text: '毛毛雨', icon: 'ph-cloud-rain', theme: 'rainy', isRain: true },
            53: { text: '溫和毛毛雨', icon: 'ph-cloud-rain', theme: 'rainy', isRain: true },
            55: { text: '密集毛毛雨', icon: 'ph-cloud-rain', theme: 'rainy', isRain: true },
            61: { text: '小雨', icon: 'ph-cloud-rain', theme: 'rainy', isRain: true },
            63: { text: '中雨', icon: 'ph-cloud-rain', theme: 'rainy', isRain: true },
            65: { text: '大雨', icon: 'ph-cloud-rain', theme: 'rainy', isRain: true },
            71: { text: '小雪', icon: 'ph-cloud-snow', theme: 'rainy', isRain: false },
            73: { text: '中雪', icon: 'ph-cloud-snow', theme: 'rainy', isRain: false },
            75: { text: '大雪', icon: 'ph-cloud-snow', theme: 'rainy', isRain: false },
            95: { text: '雷雨', icon: 'ph-cloud-lightning', theme: 'rainy', isRain: true },
            99: { text: '狂風雷雨', icon: 'ph-cloud-lightning', theme: 'rainy', isRain: true }
        };

        // 數字跳動動畫
        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                // 使用 easeOutQuart 讓數字停得更自然
                const easeOut = 1 - Math.pow(1 - progress, 4);
                obj.innerHTML = Math.floor(start + easeOut * (end - start));
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        // ================= 動態背景特效 =================
        function setWeatherTheme(theme, isNight) {
            // 清除現有特效
            effectLayer.innerHTML = '';
            
            let finalTheme = theme;
            if (isNight && theme === 'sunny') {
                finalTheme = 'night';
            }

            bgContainer.className = `theme-${finalTheme}`;

            // 生成特效粒子
            if (finalTheme === 'sunny') {
                // 產生雲朵
                for(let i=0; i<3; i++){
                    let cloud = document.createElement('div');
                    cloud.className = 'cloud';
                    cloud.style.width = `${Math.random() * 100 + 100}px`;
                    cloud.style.height = `${Math.random() * 30 + 30}px`;
                    cloud.style.top = `${Math.random() * 30}%`;
                    cloud.style.animationDuration = `${Math.random() * 20 + 30}s`;
                    cloud.style.animationDelay = `-${Math.random() * 20}s`;
                    effectLayer.appendChild(cloud);
                }
            } else if (finalTheme === 'rainy') {
                // 產生雨滴
                for(let i=0; i<40; i++){
                    let drop = document.createElement('div');
                    drop.className = 'raindrop';
                    drop.style.left = `${Math.random() * 100}%`;
                    drop.style.animationDuration = `${Math.random() * 0.5 + 0.5}s`;
                    drop.style.animationDelay = `${Math.random() * 2}s`;
                    effectLayer.appendChild(drop);
                }
            } else if (finalTheme === 'night') {
                // 產生星星
                for(let i=0; i<40; i++){
                    let star = document.createElement('div');
                    star.className = 'star';
                    let size = Math.random() * 3 + 1;
                    star.style.width = `${size}px`;
                    star.style.height = `${size}px`;
                    star.style.top = `${Math.random() * 60}%`;
                    star.style.left = `${Math.random() * 100}%`;
                    star.style.animationDuration = `${Math.random() * 2 + 1}s`;
                    star.style.animationDelay = `${Math.random() * 2}s`;
                    effectLayer.appendChild(star);
                }
            }
        }

        // ================= 資料處理與渲染 =================
        async function fetchWeatherData(lat, lon, cityName) {
            try {
                // 呼叫 Open-Meteo 免費 API
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,is_day,precipitation,weather_code,wind_speed_10m&hourly=temperature_2m,precipitation_probability,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto`);
                const data = await response.json();

                updateUI(data, cityName);
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            } catch (error) {
                console.error("天氣資料獲取失敗:", error);
                alert("無法獲取天氣資料，請稍後再試。");
                loader.style.display = 'none';
            }
        }

        function updateUI(data, cityName) {
            const current = data.current;
            const daily = data.daily;
            const hourly = data.hourly;
            
            const code = current.weather_code;
            const weatherInfo = weatherCodes[code] || weatherCodes[0];
            const isNight = current.is_day === 0;

            // 1. 更新主題與特效
            setWeatherTheme(weatherInfo.theme, isNight);

            // 2. 更新當前天氣
            document.getElementById('city-name').innerText = cityName;
            document.getElementById('condition-text').innerText = weatherInfo.text;
            
            // 溫度跳動動畫
            const tempEl = document.getElementById('temp-val');
            animateValue(tempEl, 0, Math.round(current.temperature_2m), 1500);
            
            document.getElementById('temp-max').innerText = Math.round(daily.temperature_2m_max[0]);
            document.getElementById('temp-min').innerText = Math.round(daily.temperature_2m_min[0]);

            // 3. 更新網格資料
            document.getElementById('feels-like').innerText = Math.round(current.apparent_temperature);
            document.getElementById('humidity').innerText = current.relative_humidity_2m;
            document.getElementById('wind-speed').innerText = Math.round(current.wind_speed_10m);
            // 抓取下一小時的降雨機率
            const currentHourIdx = new Date().getHours();
            document.getElementById('rain-chance').innerText = hourly.precipitation_probability[currentHourIdx] || 0;

            // 4. 更新 24 小時預報
            const hourlyContainer = document.getElementById('hourly-container');
            hourlyContainer.innerHTML = '';
            for(let i = currentHourIdx; i < currentHourIdx + 24; i++) {
                const time = new Date(hourly.time[i]);
                const hourCode = hourly.weather_code[i];
                const hourIcon = (weatherCodes[hourCode] || weatherCodes[0]).icon;
                
                const hourDiv = document.createElement('div');
                hourDiv.className = 'hourly-item';
                hourDiv.innerHTML = `
                    <div class="hourly-time">${i === currentHourIdx ? '現在' : time.getHours() + '時'}</div>
                    <i class="ph ${hourIcon} hourly-icon"></i>
                    <div class="hourly-temp">${Math.round(hourly.temperature_2m[i])}°</div>
                `;
                hourlyContainer.appendChild(hourDiv);
            }

            // 5. 更新 7 天預報
            const dailyContainer = document.getElementById('daily-container');
            dailyContainer.innerHTML = '';
            const daysOfWeek = ['週日', '週一', '週二', '週三', '週四', '週五', '週六'];
            
            for(let i = 0; i < 7; i++) {
                const date = new Date(daily.time[i]);
                const dayCode = daily.weather_code[i];
                const dayIcon = (weatherCodes[dayCode] || weatherCodes[0]).icon;
                
                const dayDiv = document.createElement('div');
                dayDiv.className = 'daily-item';
                dayDiv.innerHTML = `
                    <div class="daily-day">${i === 0 ? '今天' : daysOfWeek[date.getDay()]}</div>
                    <div class="daily-icon"><i class="ph ${dayIcon}"></i></div>
                    <div class="daily-temps">
                        <span class="temp-min">${Math.round(daily.temperature_2m_min[i])}°</span>
                        <span>${Math.round(daily.temperature_2m_max[i])}°</span>
                    </div>
                `;
                dailyContainer.appendChild(dayDiv);
            }
        }

        // ================= 搜尋與定位邏oring =================
        // 使用 Open-Meteo Geocoding API 搜尋城市
        async function searchCity(query) {
            loader.style.display = 'flex';
            loader.style.opacity = '1';
            try {
                const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1&language=zh`);
                const data = await res.json();
                
                if(data.results && data.results.length > 0) {
                    const city = data.results[0];
                    fetchWeatherData(city.latitude, city.longitude, city.name);
                } else {
                    alert("找不到該城市，請輸入英文拼音或其他城市名稱 (如: Tokyo, London)。");
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 500);
                }
            } catch (err) {
                console.error(err);
                loader.style.display = 'none';
            }
        }

        document.getElementById('search-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && this.value.trim() !== '') {
                searchCity(this.value.trim());
                this.blur(); // 隱藏手機鍵盤
            }
        });

        // HTML5 地理定位
        function getLocationWeather() {
            loader.style.display = 'flex';
            loader.style.opacity = '1';
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        
                        // 嘗試使用 Nominatim API 進行反向地理編碼以獲取城市名稱
                        try {
                            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
                            const data = await res.json();
                            const cityName = data.address.city || data.address.town || data.address.village || '目前位置';
                            fetchWeatherData(lat, lon, cityName);
                        } catch {
                            // 若反向地理編碼失敗，直接顯示目前位置
                            fetchWeatherData(lat, lon, '目前位置');
                        }
                    },
                    (error) => {
                        console.warn("定位失敗或被拒絕，載入預設城市。");
                        fetchWeatherData(25.0330, 121.5654, '台北市'); // 預設台北
                    },
                    { timeout: 10000 }
                );
            } else {
                fetchWeatherData(25.0330, 121.5654, '台北市');
            }
        }

        // ================= 初始化 =================
        window.onload = () => {
            // 進入網站時自動請求定位
            getLocationWeather();
        };

    </script>
</body>
</html>
